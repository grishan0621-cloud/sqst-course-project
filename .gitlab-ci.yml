# GitLab CI/CD — SonarQube + Semgrep (многоуровневый SAST)
# Урок 15: Альтернативы SonarQube и расширение практики

image: python:3.11-slim

stages:
  - test
  - sast
  - dependency-check
  - sonar

variables:
  SONAR_PROJECT_KEY: "vulnerable-app"
  SONAR_PROJECT_VERSION: "1.0-lesson15"
  GIT_DEPTH: "0"

test:
  stage: test
  script:
    - echo "Tests passed"

# Уровень 1: Semgrep (быстрый SAST, результат — через 10-30 сек)
semgrep:
  stage: sast
  image: returntocorp/semgrep:latest
  script:
    - semgrep --config .semgrep.yml --json --output semgrep-report.json
      backend/ frontend/ || true
    - semgrep --config p/owasp-top-ten --json --output semgrep-owasp.json
      backend/ frontend/ || true
  artifacts:
    paths:
      - semgrep-report.json
      - semgrep-owasp.json
    when: always

# Уровень 2: OWASP Dependency-Check
# OWASP DC НЕ парсит requirements.txt — нужны installed packages
# (*.dist-info/METADATA). Сначала ставим зависимости в .deps, затем сканируем .deps.
# См. методичку L9 §4 «Что НЕ парсит OWASP DC».
owasp-dependency-check:
  stage: dependency-check
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  before_script:
    - apt-get update -qq && apt-get install -y -qq python3 python3-pip
    - python3 -m pip install --break-system-packages --target=.deps -r backend/requirements.txt
  script:
    - /usr/share/dependency-check/bin/dependency-check.sh
      --project "vulnerable-app"
      --scan .deps
      --format JSON
      --format HTML
      --out dependency-check-report
      --failOnCVSS 9
  artifacts:
    paths:
      - dependency-check-report/
    when: always

# Уровень 3: SonarQube (глубокий анализ)
sonar-scan:
  stage: sonar
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner
      -Dsonar.projectKey="${SONAR_PROJECT_KEY}"
      -Dsonar.projectVersion="${SONAR_PROJECT_VERSION}"
      -Dsonar.sources=backend,frontend
      -Dsonar.host.url="${SONAR_HOST_URL}"
      -Dsonar.token="${SONAR_TOKEN}"
  allow_failure: false
