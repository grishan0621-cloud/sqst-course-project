# SonarQube — оптимизированная конфигурация для production
# Урок 13: Масштабирование и производительность

services:
  sonarqube:
    image: sonarqube:community
    # Имя отличается от dev-стенда (там container_name: sonarqube),
    # чтобы оба compose-файла можно было поднимать на одной машине.
    container_name: sonarqube_prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      # JVM-настройки: увеличены для production нагрузки
      SONAR_WEB_JAVAADDITIONALOPTS: "-Xmx2g -Xms1g"
      SONAR_CE_JAVAADDITIONALOPTS: "-Xmx4g -Xms2g"
      SONAR_SEARCH_JAVAADDITIONALOPTS: "-Xmx2g -Xms2g -XX:MaxDirectMemorySize=1g"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: sonarqube_db_prod
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      # Относительные bind-пути резолвятся от каталога compose-файла,
      # т.е. от performance/ — поэтому именно ./postgresql.conf.
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_data:
