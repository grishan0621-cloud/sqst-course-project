# GitHub Actions — интеграция SonarQube
# Урок 4: Интеграция SonarQube с CI/CD
#
# Этот workflow — третий вариант к уже существующим .gitlab-ci.yml и
# Jenkinsfile. Логика та же: checkout → smoke-тест → sonar-scanner с
# sonar.qualitygate.wait=true (упасть, если Quality Gate = ERROR).
#
# Секреты в Settings → Secrets and variables → Actions:
#   SONAR_TOKEN     — Project Analysis Token из SonarQube (User → My Account
#                     → Security → Generate Tokens)
#   SONAR_HOST_URL  — URL до SonarQube, доступный из публичного раннера
#                     GitHub. На localhost SQ из github.com не дотянется,
#                     поэтому есть три варианта (см. README, раздел
#                     «GitHub Actions»):
#                       1) ngrok / cloudflared туннель к локальному 9000
#                       2) self-hosted runner внутри сети с SonarQube
#                       3) публичный SonarQube (например, SonarCloud — но это
#                          уже отдельный продукт, не CE)
#
# Пока секреты не заданы (например, в апстрим-репо или в свежем форке),
# шаг скана ПРОПУСКАЕТСЯ, а job завершается зелёным — чтобы не засорять
# историю CI ложными падениями. Настройте секреты, и скан начнёт
# выполняться на каждый push/PR в main.
#
# В Community Edition sonar.branch.name игнорируется, поэтому всё, что
# не main, попадает в основную ветку проекта SonarQube. Для разделения
# по веткам нужен Developer Edition+.

name: SonarQube Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonar-scan:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Нужна полная история, чтобы blame/новый код корректно считались
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke test
        run: |
          python -m pip install --quiet flask
          echo "Smoke tests passed"

      - name: Проверить, настроен ли SonarQube
        id: sonar_cfg
        run: |
          if [ -z "${SONAR_HOST_URL}" ]; then
            echo "::notice::SONAR_HOST_URL/SONAR_TOKEN не заданы — шаг скана пропущен. Настройте секреты в Settings → Secrets → Actions для реального анализа."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube Scan
        if: steps.sonar_cfg.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          args: >
            -Dsonar.projectKey=vulnerable-app
            -Dsonar.projectVersion=1.0-lesson4
            -Dsonar.sources=vulnerable-app
            -Dsonar.qualitygate.wait=true
