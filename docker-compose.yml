# =============================================================================
# SonarQube CE + PostgreSQL — учебный стенд курса OTUS DevSecOps
# SonarQube + PostgreSQL — учебный стенд курса OTUS
# =============================================================================
# Запуск:        docker compose up -d
# Остановка:     docker compose down
# Полный сброс:  docker compose down -v
# =============================================================================

services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    # В образе sonarqube:community нет ни curl, ни wget, поэтому проверяем
    # /api/system/status встроенными средствами bash (/dev/tcp): открываем
    # сокет, шлём HTTP/1.0-запрос и ждём "status":"UP" в ответе.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 &&
          printf "GET /api/system/status HTTP/1.0\r\n\r\n" >&3 &&
          grep -q "\"status\":[[:space:]]*\"UP\"" <&3'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  db:
    image: postgres:15
    container_name: sonarqube_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_data:
